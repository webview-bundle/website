name: references
on:
  repository_dispatch:
    types: [generate-references]
  workflow_dispatch:
    inputs:
      ref:
        description: 'webview-bundle ref (tag/branch/SHA) to generate from'
        required: false
        default: 'main'
permissions:
  contents: write
  pull-requests: write
concurrency:
  group: references
  cancel-in-progress: true
jobs:
  generate:
    runs-on: ubuntu-latest
    env:
      WVB_REF: ${{ github.event.client_payload.ref || inputs.ref || 'main' }}
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # 6.0.1
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # 6.0.1
        with:
          repository: webview-bundle/webview-bundle
          ref: ${{ env.WVB_REF }}
          path: .webview-bundle
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # 4.0.1
        with:
          install_args: 'node'
      - run: corepack enable
      - run: yarn install
      - run: yarn install --mode=skip-build
        working-directory: .webview-bundle
      - run: yarn gen:references --repo .webview-bundle
      - run: yarn gen:fumadocs
      - run: yarn format content/docs/references/api
      - uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # 8.1.1
        with:
          branch: docs/regenerate-references
          delete-branch: true
          add-paths: content/docs/references/api
          commit-message: 'docs(references): regenerate API references from webview-bundle@${{ env.WVB_REF }}'
          title: 'docs(references): regenerate API references'
          body: |
            Auto-generated JavaScript API references from
            [`webview-bundle@${{ env.WVB_REF }}`](https://github.com/webview-bundle/webview-bundle/tree/${{ env.WVB_REF }}).

            Generated by `yarn gen:references` (TypeScript + JSDoc via TypeDoc) —
            see `scripts/generate-references.ts` and `.github/workflows/references.yaml`.
