<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 388" width="640" height="388" role="img" aria-label="A web app calls the native host through @wvb/bridge; the host embeds the wvb Rust core, which reads from a source and a remote server.">
  <style>
    .panel{fill:#fafafa;stroke:#e4e4e7}
    .box{fill:#ffffff;stroke:#e4e4e7;stroke-width:1}
    .accent{fill:#eff4ff;stroke:#2563eb;stroke-width:1.5}
    text{font-family:"Inter",ui-sans-serif,system-ui,sans-serif;fill:#18181b}
    .mono{font-family:"JetBrains Mono",ui-monospace,SFMono-Regular,Menlo,monospace}
    .lbl{font-family:"JetBrains Mono",ui-monospace,monospace;fill:#71717a;letter-spacing:.1em}
    .muted{fill:#71717a}
    .brand{fill:#2563eb}
    .flow{stroke:#71717a;stroke-width:1.5;fill:none;marker-end:url(#arw)}
    .arw{fill:#71717a}
    @media (prefers-color-scheme:dark){
      .panel{fill:#0e0e0f;stroke:#27272a}
      .box{fill:#141414;stroke:#27272a}
      .accent{fill:#101a2e;stroke:#3b82f6}
      text{fill:#f4f4f5}
      .lbl,.muted{fill:#a1a1aa}
      .brand{fill:#60a5fa}
      .flow{stroke:#a1a1aa}
      .arw{fill:#a1a1aa}
    }
  </style>
  <defs>
    <marker id="arw" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0.5,0.5 L6.5,3 L0.5,5.5 Z" class="arw"/>
    </marker>
  </defs>

  <rect class="panel" x="1" y="1" width="638" height="386" rx="5"/>

  <!-- web app -->
  <rect class="box" x="50" y="22" width="540" height="60" rx="3"/>
  <text x="70" y="48" font-size="13">Web app — HTML / JS in the webview</text>
  <text class="mono brand" x="70" y="68" font-size="11.5">@wvb/bridge  invoke()</text>

  <path class="flow" d="M320,82 V118"/>
  <text class="lbl" x="332" y="104" font-size="10">electron · tauri · android · ios</text>

  <!-- native host -->
  <rect class="box" x="50" y="120" width="540" height="60" rx="3"/>
  <text x="70" y="146" font-size="13">Native host</text>
  <text class="mono muted" x="70" y="166" font-size="11.5">@wvb/node · wvb-tauri · UniFFI · @wvb/deno</text>

  <path class="flow" d="M320,180 V216"/>

  <!-- core (accent) -->
  <rect class="accent" x="50" y="218" width="540" height="60" rx="3"/>
  <text class="brand" x="70" y="244" font-size="13" font-weight="600">wvb core (Rust)</text>
  <text class="mono muted" x="70" y="264" font-size="11.5">source · protocol · remote · updater</text>

  <!-- split to source / remote -->
  <path class="flow" d="M180,278 V316"/>
  <path class="flow" d="M460,278 V316"/>

  <rect class="box" x="50" y="318" width="255" height="56" rx="3"/>
  <text x="178" y="344" font-size="12.5" text-anchor="middle">Source</text>
  <text class="mono muted" x="178" y="362" font-size="11" text-anchor="middle">builtin · remote</text>

  <rect class="box" x="335" y="318" width="255" height="56" rx="3"/>
  <text x="462" y="344" font-size="12.5" text-anchor="middle">Remote server</text>
  <text class="mono muted" x="462" y="362" font-size="11" text-anchor="middle">OTA bundles</text>
</svg>
