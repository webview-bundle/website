<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300" width="760" height="300" role="img" aria-label="Build output is packed into a .wvb archive, served to the webview, and updated over the air from a remote server.">
  <style>
    .panel{fill:#fafafa;stroke:#e4e4e7}
    .box{fill:#ffffff;stroke:#e4e4e7;stroke-width:1}
    .accent{fill:#eff4ff;stroke:#2563eb;stroke-width:1.5}
    text{font-family:"Inter",ui-sans-serif,system-ui,sans-serif;fill:#18181b}
    .mono{font-family:"JetBrains Mono",ui-monospace,SFMono-Regular,Menlo,monospace}
    .lbl{font-family:"JetBrains Mono",ui-monospace,monospace;fill:#71717a;letter-spacing:.12em}
    .muted{fill:#71717a}
    .brand{fill:#2563eb}
    .flow{stroke:#71717a;stroke-width:1.5;fill:none;marker-end:url(#arw)}
    .arw{fill:#71717a}
    @media (prefers-color-scheme:dark){
      .panel{fill:#0e0e0f;stroke:#27272a}
      .box{fill:#141414;stroke:#27272a}
      .accent{fill:#101a2e;stroke:#3b82f6}
      text{fill:#f4f4f5}
      .lbl,.muted{fill:#a1a1aa}
      .brand{fill:#60a5fa}
      .flow{stroke:#a1a1aa}
      .arw{fill:#a1a1aa}
    }
  </style>
  <defs>
    <marker id="arw" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0.5,0.5 L6.5,3 L0.5,5.5 Z" class="arw"/>
    </marker>
  </defs>

  <rect class="panel" x="1" y="1" width="758" height="298" rx="5"/>

  <!-- column labels -->
  <text class="lbl" x="114" y="34" font-size="10" text-anchor="middle">BUILD OUTPUT</text>
  <text class="lbl" x="380" y="34" font-size="10" text-anchor="middle">.WVB ARCHIVE</text>
  <text class="lbl" x="646" y="34" font-size="10" text-anchor="middle">WEBVIEW HOST</text>

  <!-- A: build output -->
  <rect class="box" x="24" y="48" width="180" height="100" rx="3"/>
  <text class="mono" x="42" y="82" font-size="12">dist/</text>
  <text class="mono muted" x="58" y="104" font-size="12">index.html</text>
  <text class="mono muted" x="58" y="124" font-size="12">app.js …</text>

  <!-- B: .wvb archive (accent) -->
  <rect class="accent" x="290" y="48" width="180" height="100" rx="3" stroke-dasharray="5 4"/>
  <text class="mono brand" x="380" y="90" font-size="12.5" text-anchor="middle" font-weight="600">app_1.0.0.wvb</text>
  <text class="mono muted" x="380" y="112" font-size="11" text-anchor="middle">compressed · verified</text>

  <!-- C: webview host -->
  <rect class="box" x="556" y="48" width="180" height="100" rx="3"/>
  <text class="mono" x="646" y="86" font-size="11" text-anchor="middle">app://app/index.html</text>
  <text class="mono muted" x="646" y="110" font-size="11" text-anchor="middle">offline · instant</text>

  <!-- top arrows -->
  <path class="flow" d="M204,98 H288"/>
  <text class="lbl" x="246" y="90" font-size="10" text-anchor="middle">pack</text>
  <path class="flow" d="M470,98 H554"/>
  <text class="lbl" x="513" y="90" font-size="10" text-anchor="middle">serve</text>

  <!-- remote server -->
  <rect class="box" x="290" y="214" width="180" height="56" rx="3"/>
  <text class="mono" x="380" y="247" font-size="12" text-anchor="middle">remote server</text>

  <!-- update loop -->
  <path class="flow" d="M380,148 V212"/>
  <text class="lbl" x="392" y="186" font-size="10">upload + deploy</text>
  <path class="flow" d="M470,242 H646 V152"/>
  <text class="lbl" x="556" y="234" font-size="10" text-anchor="middle">download + verify</text>
  <text class="lbl brand" x="556" y="284" font-size="10" text-anchor="middle">updater</text>
</svg>
