<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 232" width="780" height="232" role="img" aria-label="The developer machine uploads and deploys a bundle to the remote server; the end-user device checks the remote, downloads, verifies, and installs the update.">
  <style>
    .panel{fill:#fafafa;stroke:#e4e4e7}
    .box{fill:#ffffff;stroke:#e4e4e7;stroke-width:1}
    .accent{fill:#eff4ff;stroke:#2563eb;stroke-width:1.5}
    text{font-family:"Inter",ui-sans-serif,system-ui,sans-serif;fill:#18181b}
    .mono{font-family:"JetBrains Mono",ui-monospace,SFMono-Regular,Menlo,monospace}
    .lbl{font-family:"JetBrains Mono",ui-monospace,monospace;fill:#71717a;letter-spacing:.1em}
    .muted{fill:#71717a}
    .brand{fill:#2563eb}
    .flow{stroke:#71717a;stroke-width:1.5;fill:none;marker-end:url(#arw)}
    .arw{fill:#71717a}
    @media (prefers-color-scheme:dark){
      .panel{fill:#0e0e0f;stroke:#27272a}
      .box{fill:#141414;stroke:#27272a}
      .accent{fill:#101a2e;stroke:#3b82f6}
      text{fill:#f4f4f5}
      .lbl,.muted{fill:#a1a1aa}
      .brand{fill:#60a5fa}
      .flow{stroke:#a1a1aa}
      .arw{fill:#a1a1aa}
    }
  </style>
  <defs>
    <marker id="arw" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0.5,0.5 L6.5,3 L0.5,5.5 Z" class="arw"/>
    </marker>
  </defs>

  <rect class="panel" x="1" y="1" width="778" height="230" rx="5"/>

  <text class="lbl" x="130" y="30" font-size="10" text-anchor="middle">DEVELOPER · CI</text>
  <text class="lbl" x="410" y="30" font-size="10" text-anchor="middle">REMOTE SERVER</text>
  <text class="lbl" x="660" y="30" font-size="10" text-anchor="middle">END-USER DEVICE</text>

  <!-- developer -->
  <rect class="box" x="20" y="44" width="220" height="158" rx="3"/>
  <text class="mono" x="36" y="74" font-size="11.5">wvb pack ./dist</text>
  <text class="mono muted" x="48" y="94" font-size="11.5">→ app_1.1.0.wvb</text>
  <text class="mono" x="36" y="124" font-size="11.5">wvb upload</text>
  <text class="mono muted" x="48" y="144" font-size="11">+integrity +signature</text>
  <text class="mono" x="36" y="174" font-size="11.5">wvb deploy --channel</text>

  <!-- remote -->
  <rect class="box" x="300" y="70" width="180" height="106" rx="3"/>
  <text class="mono" x="390" y="108" font-size="12" text-anchor="middle">store version</text>
  <text class="mono" x="390" y="138" font-size="12" text-anchor="middle">mark deployed</text>
  <text class="mono muted" x="390" y="156" font-size="11" text-anchor="middle">(per channel)</text>

  <!-- device -->
  <rect class="box" x="540" y="44" width="220" height="158" rx="3"/>
  <text class="mono" x="556" y="74" font-size="11.5">updater.getUpdate()</text>
  <text class="mono muted" x="556" y="96" font-size="11.5">isAvailable?</text>
  <text class="mono" x="556" y="128" font-size="11.5">HEAD / GET</text>
  <text class="mono muted" x="556" y="148" font-size="11.5">/bundles/app</text>
  <text class="mono brand" x="556" y="182" font-size="11.5">verify + install</text>

  <!-- dev -> remote -->
  <path class="flow" d="M240,104 H298"/>
  <text class="lbl" x="269" y="96" font-size="9.5" text-anchor="middle">upload</text>
  <path class="flow" d="M240,150 H298"/>
  <text class="lbl" x="269" y="142" font-size="9.5" text-anchor="middle">deploy</text>

  <!-- device <-> remote -->
  <path class="flow" d="M540,104 H482"/>
  <text class="lbl" x="511" y="96" font-size="9.5" text-anchor="middle">check</text>
  <path class="flow" d="M482,150 H540"/>
  <text class="lbl" x="511" y="142" font-size="9.5" text-anchor="middle">bundle</text>
</svg>
